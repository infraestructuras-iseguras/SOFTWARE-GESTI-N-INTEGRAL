name: Build and Deploy to Azure

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Login to Azure Container Registry
      run: |
        az acr login --name infraestructurasiseuras
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: infraestructurasiseuras.azurecr.io/sgrt:${{ github.sha }},infraestructurasiseuras.azurecr.io/sgrt:latest
        file: ./Dockerfile
    
    - name: Deploy to Azure App Service
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'infraestructuras-iseguras'
        images: 'infraestructurasiseuras.azurecr.io/sgrt:latest'
    
    - name: Logout from Azure
      run: az logout
